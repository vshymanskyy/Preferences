; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
monitor_speed = 115200
lib_deps = file://../

[env:native]
platform = native
lib_compat_mode = off
build_flags =
    -DNVS_USE_POSIX
    -DNVS_PATH=\".pio-nvs\"
    -include test/ArduinoCompat.h

; ------------------------------
; Tests for supported platforms
; ------------------------------

[env:esp8266]
platform = espressif8266@4.2.1
framework = arduino
board = d1_mini
upload_speed = 460800

board_build.f_cpu = 160000000L  ; Set CPU frequency to 160MHz
board_build.f_flash = 80000000L ; Set FLASH frequency to 80MHz
board_build.ldscript = eagle.flash.4m1m.ld
board_build.filesystem = littlefs
build_flags =
    -DNVS_USE_LITTLEFS

[env:esp8266-spiffs]
extends = env:esp8266
board_build.filesystem = spiffs
build_flags =
    -DNVS_USE_SPIFFS


[env:rp2040connect]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board = arduino_nano_connect
board_build.core = earlephilhower
board_build.filesystem_size = 512k

[env:nano33iot]
platform = atmelsam
framework = arduino
board = nano_33_iot

lib_deps =
    arduino-libraries/WiFiNINA@^2.1.1

[env:mkrwifi1010]
platform = atmelsam
framework = arduino
board = mkrwifi1010

lib_deps =
    arduino-libraries/WiFiNINA@^2.1.1

[env:wioterminal]
platform = atmelsam
framework = arduino
board = seeed_wio_terminal

lib_deps =
    ${env.lib_deps}
    Seeed Arduino SFUD@^2.0.2

; ------------------------------
; ESP32 compatibility tests
; ------------------------------

[esp32]
; Arduino v3.3.9 / IDF v5.5.4
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
upload_speed = 921600

lib_deps =
    Preferences                         ; Use native ESP32 Preferences

build_flags =
    -DCORE_DEBUG_LEVEL=0                ; Set 0 to reduce the build size
    -Werror=return-type                 ; Fail on return type error

[env:esp32]
extends = esp32
board = esp32dev

[env:esp32c3]
extends = esp32
board = esp32-c3-devkitm-1
upload_speed = 460800

[env:esp32c5]
extends = esp32
board = esp32-c5-devkitc-1

build_flags =
    ${esp32.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32s2]
extends = esp32
board = esp32-s2-saola-1

[env:esp32s3]
extends = esp32
board = esp32-s3-devkitc-1
