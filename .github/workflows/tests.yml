name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-arduino:
    name: Arduino ${{ matrix.board.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        board:
          - name: ESP8266 D1 mini
            fqbn: esp8266:esp8266:d1_mini
            platform: esp8266:esp8266
            package_url: http://arduino.esp8266.com/stable/package_esp8266com_index.json
            libraries: ""
          - name: Wio Terminal
            fqbn: Seeeduino:samd:seeed_wio_terminal
            platform: Seeeduino:samd
            package_url: https://files.seeedstudio.com/arduino/package_seeeduino_boards_index.json
            libraries: Seeed Arduino SFUD
          - name: Raspberry Pi Pico
            fqbn: rp2040:rp2040:rpipico
            platform: rp2040:rp2040
            package_url: https://github.com/earlephilhower/arduino-pico/releases/download/global/package_rp2040_index.json
            libraries: ""
          - name: Realtek AmebaD
            fqbn: realtek:AmebaD:Ameba_AMB21_AMB22
            platform: realtek:AmebaD
            package_url: https://github.com/Ameba-AIoT/ameba-arduino-d/raw/master/Arduino_package/package_realtek_amebad_index.json
            libraries: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install board core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls "${{ matrix.board.package_url }}"
          arduino-cli core update-index
          arduino-cli core install "${{ matrix.board.platform }}"

      - name: Install board libraries
        if: matrix.board.libraries != ''
        run: arduino-cli lib install "${{ matrix.board.libraries }}"

      - name: Compile sketch
        run: arduino-cli compile --fqbn "${{ matrix.board.fqbn }}" --library . "examples/StartCounter"

  build-platformio:
    name: PIO ${{ matrix.env }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        env:
          - native
          - esp8266
          - esp8266-spiffs
          - wioterminal
          - rp2040connect
          - rp2350

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache PlatformIO packages
        uses: actions/cache@v6
        with:
          path: ~/.platformio
          key: pio-${{ matrix.env }}-${{ hashFiles('tests/platformio.ini') }}
          restore-keys: |
            pio-${{ matrix.env }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run test
        working-directory: tests
        run: |
          if [ "${{ matrix.env }}" = "native" ]; then
            pio test -e native
          else
            pio test -e ${{ matrix.env }} --without-uploading --without-testing
          fi
